name: Trending Song Lyrics Video Pipeline

on:
  schedule:
    - cron: '0 6,14,22 * * *'  # 3 times daily
  workflow_dispatch:

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg imagemagick fonts-liberation fonts-dejavu-core libsndfile1

      - name: Install Python packages
        run: |
          python -m pip install --upgrade pip
          pip install wheel setuptools
          pip install requests==2.33.1
          pip install litellm==1.86.2
          pip install moviepy==2.2.1
          pip install edge-tts==7.2.7
          pip install gtts
          pip install google-auth google-auth-oauthlib google-auth-httplib2
          pip install google-api-python-client
          pip install pillow numpy
          pip install openai==2.24.0

      - name: Verify installations
        run: |
          python -c "import litellm; print('litellm:', litellm.__version__)"
          python -c "import moviepy; print('moviepy:', moviepy.__version__)"
          python -c "import edge_tts; print('edge-tts: OK')"
          python -c "import PIL; print('PIL:', PIL.__version__)"

      - name: Run pipeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_TOKEN_PICKLE_BASE64: ${{ secrets.YOUTUBE_TOKEN_PICKLE_BASE64 }}
          GENIUS_API_KEY: ${{ secrets.GENIUS_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
        run: python main.py
