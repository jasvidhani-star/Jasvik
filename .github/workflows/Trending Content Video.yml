name: Trending Content Video

on:
  push:
- name: Create output directory
        run: mkdir -p output

      - name: Run video generator
        env:
          # ... baki ke saare environment variables wese hi rahenge
        run: |
          python main.py

    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create token.pickle
        shell: bash
        env:
          TOKEN_DATA: ${{ secrets.YOUTUBE_TOKEN_PICKLE_BASE64 }}
        run: |
          echo "$TOKEN_DATA" | base64 --decode > token.pickle

      - name: Run video generator
        env:
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
          TIKTOK_API_KEY: ${{ secrets.TIKTOK_API_KEY }}
          FACEBOOK_ACCESS_TOKEN: ${{ secrets.FACEBOOK_ACCESS_TOKEN }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
        run: |
          python main.py
        continue-on-error: true

      - name: Upload output artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: video-output
          path: |
            output/
            temp/
