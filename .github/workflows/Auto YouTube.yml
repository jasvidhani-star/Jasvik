on:
  schedule:
    # 0 3 * * * = सुबह 8:30 IST (3:00 UTC)
    # 0 9 * * * = दोपहर 2:30 IST (9:00 UTC)
    # 0 13 * * * = शाम 6:30 IST (13:00 UTC)
    - cron: '0 3 * * *'
    - cron: '0 9 * * *'
    - cron: '0 13 * * *'
  workflow_dispatch: # मैन्युअल टेस्टिंग के लिए

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install google-generativeai gtts moviepy google-auth google-auth-oauthlib google-api-python-client
          
      - name: Run Automation
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CLIENT_SECRET_JSON: ${{ secrets.CLIENT_SECRET_JSON }}
          TOKEN_PICKLE_BASE64: ${{ secrets.TOKEN_PICKLE_BASE64 }}
        run: |
          python main.py
