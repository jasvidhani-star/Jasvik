on:
  schedule:
    - cron: '0 6,14,22 * * *'
  workflow_dispatch:

jobs:
  upload:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'  # ✅ Fixed: 3.10 explicitly
          
      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg imagemagick
          sudo apt-get install -y fonts-dejavu-core
          sudo apt-get install -y libsndfile1  # Required for moviepy audio
          
      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install wheel setuptools
          pip install numpy Pillow
          pip install moviepy==1.0.3
          pip install gTTS
          pip install google-api-python-client google-auth-httplib2 google-auth-oauthlib
          pip install google-genai  # ✅ New package instead of google-generativeai
          
      - name: Verify Installations
        run: |
          python -c "import moviepy; print('moviepy:', moviepy.__version__)"
          python -c "import google.genai; print('google-genai: OK')"
          python -c "import gtts; print('gtts: OK')"
          
      - name: Generate & Upload Video
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CLIENT_SECRET_JSON: ${{ secrets.CLIENT_SECRET_JSON }}
          TOKEN_PICKLE_BASE64: ${{ secrets.TOKEN_PICKLE_BASE64 }}
        run: python main.py
