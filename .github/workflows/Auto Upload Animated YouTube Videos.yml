on:
  schedule:
    - cron: '0 6,14,22 * * *'  # 3 times daily
  workflow_dispatch:
jobs:
  upload:
    runs-on: ubuntu-latest
    timeout-minutes: 15
  
    steps:
      - uses: actions/checkout@v3
     
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
         
      - - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install google-generativeai gtts moviepy google-auth google-auth-oauthlib google-api-python-client
         
      - name: Generate & Upload
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CLIENT_SECRET_JSON: ${{ secrets.CLIENT_SECRET_JSON }}
          TOKEN_PICKLE_BASE64: ${{ secrets.TOKEN_PICKLE_BASE64 }}
        run: python main.py
      
